name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
    
    - name: Test environment creation
      run: |
        python -c "from envs import PickPlaceEnv; env = PickPlaceEnv(); env.reset(); env.close(); print('✓ PickPlaceEnv')"
        python -c "from envs import DrawerEnv; env = DrawerEnv(); env.reset(); env.close(); print('✓ DrawerEnv')"
        python -c "from envs import ToolUseEnv; env = ToolUseEnv(); env.reset(); env.close(); print('✓ ToolUseEnv')"
    
    - name: Test policy creation
      run: |
        python -c "from policies import MLPPolicy; policy = MLPPolicy(3, 12, 3); print('✓ MLP policy')"
        python -c "from policies import RNNPolicy; policy = RNNPolicy(3, 12, 3); print('✓ RNN policy')"
    
    - name: Test perception module
      run: |
        python -c "from perception import SimpleConvEncoder; encoder = SimpleConvEncoder(); print('✓ Perception')"
    
    - name: Run short rollout test
      run: |
        python scripts/test_rollout.py --episodes 2 --max_steps 10
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
